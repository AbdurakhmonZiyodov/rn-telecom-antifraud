buildscript {
    ext.safeExtGet = { prop, fallback ->
        rootProject.ext.has(prop) ? rootProject.ext.get(prop) : fallback
    }

    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath("com.android.tools.build:gradle:8.9.1")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:${safeExtGet('kotlinVersion', '2.1.20')}")
    }
}

apply plugin: "com.android.library"
apply plugin: "org.jetbrains.kotlin.android"

// --- Telecom AntiFraud SDK registry (authenticated) ---
// The SDK (uz.tbm.antifraud) is NOT on Maven Central — it lives on the operator's private
// GitLab package registry (git.rtmc.uz, project id 3), so Gradle needs a Private-Token to
// download it. We reuse the token the app already stores in android/local.properties as
// `gpr.key` (the same key existing projects use) — so consumers add nothing new.
// projectId defaults to 3 (the operator's AF SDK project); override with -PTelecomAfProjectId.
def telecomAfToken = project.findProperty("gpr.key") ?: "NO_TOKEN"
def localPropsFile = rootProject.file("local.properties")
if (localPropsFile.exists()) {
    def localProps = new Properties()
    localProps.load(new FileInputStream(localPropsFile))
    telecomAfToken = localProps.getProperty("gpr.key") ?: telecomAfToken
}
def telecomAfProjectId = project.findProperty("TelecomAfProjectId") ?: "3"
def telecomAfMavenUrl = "https://git.rtmc.uz/api/v4/projects/${telecomAfProjectId}/packages/maven"

android {
    namespace "com.rntelecomantifraud"

    compileSdk safeExtGet("compileSdkVersion", 36)

    defaultConfig {
        minSdk safeExtGet("minSdkVersion", 24)
        targetSdk safeExtGet("targetSdkVersion", 35)
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }
}

repositories {
    google()
    mavenCentral()
}

// Inject the authenticated Telecom AF registry into the consumer's root project so every
// module (including this one) can resolve `uz.tbm.antifraud:*`. Scoped via includeGroup so
// it is only queried for AF artifacts.
rootProject.allprojects {
    repositories {
        maven {
            name = "TelecomAntiFraudGitLab"
            url = uri(telecomAfMavenUrl)
            credentials(HttpHeaderCredentials) {
                name = "Private-Token"
                value = telecomAfToken
            }
            authentication {
                header(HttpHeaderAuthentication)
            }
            content {
                includeGroup "uz.tbm.antifraud"
            }
        }
    }
}

dependencies {
    implementation "com.facebook.react:react-android"
    implementation "uz.tbm.antifraud:sdk:1.1.6"
}
